apiVersion: v1
kind: Service
metadata:
  name: zomato-service
spec:
  type: NodePort   # Using NodePort for now
  selector:
    app: zomato
  ports:
    - port: 3000        # Cluster internal port
      targetPort: 3000  # Container port
      nodePort: 30007   # External port (must be between 30000-32767)
